- name: Upgrade Fedora 43 to 44
  hosts: fedora
  become: true
  gather_facts: true

  vars:
    target_release: 44

  tasks:

    - name: Check current Fedora version
      ansible.builtin.debug:
        msg: "Current version is {{ ansible_facts['distribution_major_version'] }}"

    - name: End play if already on target version
      ansible.builtin.meta: end_play
      when: ansible_facts['distribution_major_version'] | int >= target_release

    - name: Ensure system is fully updated
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes

    # Fedora doesn't reliably use reboot-required file, but keep simple approach
    - name: Check if reboot is required (kernel installed vs running)
      ansible.builtin.shell: rpm -q kernel --last | head -n1
      register: latest_kernel
      changed_when: false

    - name: Get running kernel
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Reboot if kernel mismatch
      ansible.builtin.reboot:
        msg: "Rebooting before upgrade due to kernel update"
        reboot_timeout: 600
      when: running_kernel.stdout not in latest_kernel.stdout

    - name: Ensure system-upgrade plugin is installed
      ansible.builtin.dnf:
        name: dnf-plugin-system-upgrade
        state: present

    - name: Download Fedora {{ target_release }} upgrade packages
      ansible.builtin.command: >
        dnf -y system-upgrade download
        --releasever={{ target_release }}
        --allowerasing
      register: upgrade_download
      changed_when: "'Complete!' in upgrade_download.stdout"

    - name: Trigger system upgrade reboot
      ansible.builtin.command: dnf -y system-upgrade reboot
      async: 1
      poll: 0

    - name: Wait for system to go down
      ansible.builtin.wait_for:
        port: 22
        host: "{{ inventory_hostname }}"
        state: drained
        timeout: 900

    - name: Wait for system to come back
      ansible.builtin.wait_for_connection:
        delay: 20
        timeout: 1200

    - name: Gather facts after upgrade
      ansible.builtin.setup:

    - name: Verify system is now Fedora {{ target_release }}
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution_major_version'] | int == target_release
        fail_msg: "Upgrade failed! System is not on Fedora {{ target_release }}"

    - name: Remove unused packages
      ansible.builtin.dnf:
        autoremove: yes

    - name: Clean DNF cache
      ansible.builtin.dnf:
        clean: all